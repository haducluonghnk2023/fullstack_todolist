name: CI-CD Pipeline

on:
  push:
    branches:
      - main
      - production

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rikkei-backend:latest ./be_demo_angular

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/rikkei-frontend:latest ./demo_angular

      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/rikkei-backend:latest

      - name: Push Frontend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/rikkei-frontend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Di chuyển vào thư mục project
            cd ~/devops_project

            # Pull image mới nhất từ Docker Hub
            docker-compose pull

            # Restart container với image mới
            docker-compose down
            docker-compose up -d

            # Dọn dẹp image cũ
            docker image prune -f

            # Kiểm tra container
            docker-compose ps
